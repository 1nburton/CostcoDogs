workflows:
  default-workflow:
    name: Costco Dogs CI
    max_build_duration: 120

    environment:
      node: 20

    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Lint project
        script: npm run lint

      - name: Run tests
        script: npm test || true

  ios-build:
    name: Costco Dogs iOS Build
    max_build_duration: 120

    environment:
      node: 20

    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules

    scripts:
      - name: Install dependencies
        script: npm install

      - name: EAS build iOS
        script: eas build --platform ios --non-interactive --wait

      - name: Submit to App Store Connect
        script: |
          eas submit --platform ios --latest --non-interactive --apple-id "$EXPO_APPLE_ID" --asc-app-id "$EXPO_ASC_APP_ID"

    artifacts:
      - "./build/**"
