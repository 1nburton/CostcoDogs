workflows:
  default-workflow:
    name: Costco Dogs CI
    max_build_duration: 120

    environment:
      node: 20

    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Lint project
        script: npm run lint

      - name: Run tests
        script: npm test || true

  ios-build:
    name: Costco Dogs iOS Build
    max_build_duration: 120

    environment:
      node: 20
      groups:
        - costco_dogs_secrets

    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Link EAS project
        script: |
          #!/usr/bin/env bash
          export EXPO_TOKEN="${EXPO_TOKEN:-$EXPO_CLI_AUTH_TOKEN}"
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing Expo token: set EXPO_TOKEN (or EXPO_CLI_AUTH_TOKEN) in Codemagic group costco_dogs_secrets"
            exit 1
          fi
          if [ -n "$EAS_PROJECT_ID" ]; then
            npx --yes eas-cli@latest init --id "$EAS_PROJECT_ID" --force --non-interactive
          else
            echo "EAS_PROJECT_ID not set, attempting automatic EAS init"
            npx --yes eas-cli@latest init --force --non-interactive || {
              echo "Automatic EAS init failed. Set EAS_PROJECT_ID in Codemagic group costco_dogs_secrets and retry."
              exit 1
            }
          fi

      - name: Increment buildNumber for unique EAS builds
        script: |
          #!/usr/bin/env bash
          set -o pipefail
          node -e "
          const fs = require('fs');
          const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          const currentBuild = parseInt(appJson.expo.ios.buildNumber || '1') + 1;
          appJson.expo.ios.buildNumber = String(currentBuild);
          fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
          console.log('Incremented buildNumber to: ' + currentBuild);
          "

      - name: EAS build iOS
        script: |
          #!/usr/bin/env bash
          set -o pipefail
          export EXPO_TOKEN="${EXPO_TOKEN:-$EXPO_CLI_AUTH_TOKEN}"
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing Expo token: set EXPO_TOKEN (or EXPO_CLI_AUTH_TOKEN) in Codemagic group costco_dogs_secrets"
            exit 1
          fi

          max_attempts=4
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Build attempt $attempt/$max_attempts"
            build_log=$(mktemp)

            if npx --yes eas-cli@latest build --platform ios --non-interactive --wait 2>&1 | tee "$build_log"; then
              echo "EAS build completed successfully."
              rm -f "$build_log"
              exit 0
            fi

            if grep -Eqi "Build request failed|build command failed|GraphQL request failed|Service Unavailable|429|502|503|504|timeout|timed out|ECONNRESET|ENOTFOUND|socket hang up" "$build_log"; then
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep_seconds=$((attempt * 45))
                echo "Transient build API error detected. Retrying in ${sleep_seconds}s..."
                rm -f "$build_log"
                sleep "$sleep_seconds"
                attempt=$((attempt + 1))
                continue
              fi
            fi

            echo "EAS build failed with a non-retryable error or retries exhausted."
            rm -f "$build_log"
            exit 1
          done

          echo "EAS build failed after $max_attempts attempts."
          exit 1

      - name: Submit to App Store Connect
        script: |
          #!/usr/bin/env bash
          set -o pipefail
          export EXPO_TOKEN="${EXPO_TOKEN:-$EXPO_CLI_AUTH_TOKEN}"
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing Expo token: set EXPO_TOKEN (or EXPO_CLI_AUTH_TOKEN) in Codemagic group costco_dogs_secrets"
            exit 1
          fi
          if [ -z "$EXPO_ASC_APP_ID" ]; then
            echo "Missing EXPO_ASC_APP_ID in Codemagic group costco_dogs_secrets"
            exit 1
          fi
          node -e "const fs=require('fs');const p='eas.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.submit=j.submit||{};j.submit.production=j.submit.production||{};j.submit.production.ios=j.submit.production.ios||{};j.submit.production.ios.ascAppId=process.env.EXPO_ASC_APP_ID;fs.writeFileSync(p,JSON.stringify(j,null,2));"

          max_attempts=5
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Submit attempt $attempt/$max_attempts"
            submit_log=$(mktemp)

            if npx --yes eas-cli@latest submit --platform ios --latest --profile production --non-interactive 2>&1 | tee "$submit_log"; then
              echo "EAS submit scheduled successfully."
              rm -f "$submit_log"
              exit 0
            fi

            if grep -Eqi "Service Unavailable|GraphQL request failed|429|502|503|504|timeout|timed out|ECONNRESET|ENOTFOUND|socket hang up" "$submit_log"; then
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep_seconds=$((attempt * 30))
                echo "Transient submit error detected. Retrying in ${sleep_seconds}s..."
                rm -f "$submit_log"
                sleep "$sleep_seconds"
                attempt=$((attempt + 1))
                continue
              fi
            fi

            echo "EAS submit failed with a non-retryable error or retries exhausted."
            rm -f "$submit_log"
            exit 1
          done

          echo "EAS submit failed after $max_attempts attempts."
          exit 1

    artifacts:
      - "./build/**"
