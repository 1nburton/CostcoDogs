workflows:
  default-workflow:
    name: Costco Dogs CI
    max_build_duration: 120

    environment:
      node: 20

    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Lint project
        script: npm run lint

      - name: Run tests
        script: npm test || true

  ios-build:
    name: Costco Dogs iOS Build
    max_build_duration: 120

    environment:
      node: 20
      vars:
        EXPO_CLI_AUTH_TOKEN: Encrypted(...) # set in Codemagic settings

    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules

    scripts:
      - name: Install dependencies
        script: npm install

      - name: EAS build iOS
        script: eas build --platform ios --non-interactive

    artifacts:
      - "./build/**"
